name: Auto Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.VERSION }} already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          LDFLAGS="-s -w -X github.com/meocodelabs/mrt/cmd.Version=${VERSION} -X github.com/meocodelabs/mrt/cmd.Commit=$(git rev-parse --short HEAD)"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$LDFLAGS" -o mrt_${{ matrix.goos }}_${{ matrix.goarch }}${ext} ./main.go

      - name: Upload artifact
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mrt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mrt_${{ matrix.goos }}_${{ matrix.goarch }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.TAG }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.TAG }} already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        if: steps.check_tag.outputs.exists == 'false'
        run: ls -la artifacts/

      - name: Generate release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE=""
          fi

          {
            echo "## meo-reduce-token (mrt) v${VERSION}"
            echo ""
            echo "**Release date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows  | \`mrt_windows_amd64.exe\` / \`mrt_windows_arm64.exe\` |"
            echo "| macOS    | \`mrt_darwin_amd64\` / \`mrt_darwin_arm64\` |"
            echo "| Linux    | \`mrt_linux_amd64\` / \`mrt_linux_arm64\` |"
            echo ""
            echo "### Installation"
            echo ""
            echo '```bash'
            echo "# npm (cross-platform)"
            echo "npm install -g meo-reduce-token"
            echo ""
            echo "# Static binary"
            echo "chmod +x mrt_darwin_amd64 && ./mrt_darwin_amd64 --help"
            echo '```'
            echo ""
            echo "### What's New"
            echo ""

            if [ -n "$RANGE" ]; then
              echo "**Commits since ${PREV_TAG}:**"
              echo ""
              git log "${RANGE}" --pretty=format:"- %s (%h) — %an" --no-merges
            else
              echo "**Initial release:**"
              echo ""
              git log --pretty=format:"- %s (%h) — %an" --no-merges
            fi
            echo ""
            echo ""
            echo "### Statistics"
            echo ""

            if [ -n "$RANGE" ]; then
              STATS=$(git diff --stat "${RANGE}")
            else
              STATS=$(git log --pretty=format: --shortstat | head -1)
            fi
            echo '```'
            echo "${STATS}"
            echo '```'
            echo ""
            echo "---"
            echo "_Auto-generated by GitHub Actions_"
          } > release_notes.md

      - name: Create Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.TAG }}
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: meo-reduce-token v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/mrt_darwin_amd64
            artifacts/**/mrt_darwin_arm64
            artifacts/**/mrt_linux_amd64
            artifacts/**/mrt_linux_arm64
          if-no-files-found: ignore
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.TAG }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
